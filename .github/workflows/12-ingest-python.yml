# Stage 2: schedule + working-directory + commit-back of traffic.db
# Stage 3: pip dependency caching via actions/setup-python cache

name: 12-ingest-python

on:
  workflow_dispatch:
  schedule:
    - cron: "15 8 * * *"

permissions:
  contents: write

concurrency:
  group: 12-end-traffic-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest_python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12_end

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (with pip cache — Stage 3)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 12_end/requirements-ingest.txt

      - name: Install ingest dependencies
        run: pip install -r requirements-ingest.txt

      - name: Run Python traffic ingest
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python 01_ingest_traffic.py

      - name: Verify SQLite rows (metro_id 948)
        run: |
          python - <<'PY'
          import sqlite3
          con = sqlite3.connect("data/traffic.db")
          n = con.execute(
              "SELECT COUNT(*) FROM traffic WHERE metro_id = ?", (948,)
          ).fetchone()[0]
          con.close()
          if n < 1:
              raise SystemExit(f"Expected rows for metro_id=948, found {n}")
          print(f"OK: {n} row(s) for metro_id=948")
          PY

      - name: Commit and push updated traffic.db
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/traffic.db
          if git diff --staged --quiet; then
            echo "No changes to traffic.db (nothing to commit)"
          else
            git commit -m "chore(ci): refresh 12_end/data/traffic.db via 12-ingest-python [skip ci]"
            git push
          fi
