# Weekly XGBoost retrain (Python) — writes 12_end/data/modelpy.json

name: 12-train-python

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: write

concurrency:
  group: 12-end-train-models-${{ github.ref }}
  cancel-in-progress: false

jobs:
  train_python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12_end

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 12_end/requirements-serve.txt

      - name: Install dependencies
        run: pip install -r requirements-serve.txt

      - name: Train XGBoost and write modelpy.json
        run: python 02_train_model.py

      - name: Upload xgboost-model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model
          path: 12_end/data/modelpy.json
          if-no-files-found: error

      - name: Commit and push data/modelpy.json
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/modelpy.json
          if git diff --staged --quiet; then
            echo "No changes to modelpy.json"
          else
            git commit -m "chore(ci): refresh 12_end/data/modelpy.json via 12-train-python [skip ci]"
            git push
          fi
